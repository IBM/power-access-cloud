definitions:
  models.Capacity:
    properties:
      cpu:
        type: number
      memory:
        type: integer
    type: object
  models.Catalog:
    properties:
      capacity:
        $ref: '#/definitions/models.Capacity'
      description:
        type: string
      expiry:
        type: integer
      id:
        type: string
      image_thumbnail_reference:
        type: string
      name:
        type: string
      retired:
        type: boolean
      status:
        $ref: '#/definitions/models.CatalogStatus'
      type:
        type: string
      vm:
        $ref: '#/definitions/models.VM'
    type: object
  models.CatalogStatus:
    properties:
      message:
        type: string
      ready:
        type: boolean
    type: object
  models.Feedback:
    properties:
      comment:
        maxLength: 250
        type: string
      created_at:
        description: CreatedAt is the time the event was created
        type: string
      id:
        type: string
      rating:
        $ref: '#/definitions/models.Rating'
      user_id:
        type: string
    type: object
  models.Key:
    properties:
      content:
        type: string
      id:
        type: string
      name:
        type: string
      user_id:
        type: string
    type: object
  models.MaintenanceCreateRequest:
    properties:
      enabled:
        type: boolean
      end_time:
        type: string
      message:
        type: string
      start_time:
        type: string
    required:
    - end_time
    - message
    - start_time
    type: object
  models.MaintenanceListResponse:
    properties:
      maintenances:
        items:
          $ref: '#/definitions/models.MaintenanceResponse'
        type: array
    type: object
  models.MaintenanceResponse:
    properties:
      enabled:
        type: boolean
      end_time:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      message:
        type: string
      start_time:
        type: string
    type: object
  models.MaintenanceUpdateRequest:
    properties:
      enabled:
        type: boolean
      end_time:
        type: string
      message:
        type: string
      start_time:
        type: string
    type: object
  models.Quota:
    properties:
      capacity:
        $ref: '#/definitions/models.Capacity'
      group_id:
        type: string
      id:
        type: string
    type: object
  models.Rating:
    enum:
    - positive
    - negative
    - neutral
    type: string
    x-enum-varnames:
    - Positive
    - Negative
    - Neutral
  models.Service:
    properties:
      catalog_name:
        type: string
      display_name:
        type: string
      expiry:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        $ref: '#/definitions/models.ServiceStatus'
      user_id:
        type: string
      username:
        type: string
    type: object
  models.ServiceStatus:
    properties:
      access_info:
        type: string
      message:
        type: string
      state:
        type: string
    type: object
  models.VM:
    properties:
      capacity:
        $ref: '#/definitions/models.Capacity'
      crn:
        type: string
      image:
        type: string
      network:
        type: string
      processor_type:
        type: string
      system_type:
        type: string
    type: object
